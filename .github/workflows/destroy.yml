name: Destroy Infrastructure

permissions:
  id-token: write
  contents: read

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
    secrets:
      TILE_SERVER_ACCOUNT_ID:
        required: true

env:
  AWS_REGION: ${{ inputs.aws_region }}
  AWS_PAGER: ""
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.13'

jobs:
  destroy-infrastructure:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup AWS OIDC
        uses: ./.github/actions/setup-aws-oidc
        with:
          aws_region: ${{ inputs.aws_region }}
          account_id: ${{ secrets.TILE_SERVER_ACCOUNT_ID }}
          role_duration_seconds: '14400'
      - name: Setup CDK
        uses: ./.github/actions/setup-cdk
        with:
          node_version: ${{ env.NODE_VERSION }}
      - name: Generate deployment.json
        uses: ./.github/actions/generate-deployment-json
        with:
          account_id: ${{ secrets.TILE_SERVER_ACCOUNT_ID }}
          build_from_source: 'false'
      - name: Build and synthesize CDK
        working-directory: cdk
        run: |
          npm run build
          cdk synth
      - name: Read deployment config
        id: config
        working-directory: cdk
        run: |
          PROJECT_NAME=$(python3 -c "import json; print(json.load(open('bin/deployment/deployment.json'))['projectName'])")
          echo "project_name=${PROJECT_NAME}" >> "$GITHUB_OUTPUT"
      - name: Destroy dataplane and test stacks in parallel
        working-directory: cdk
        env:
          PROJECT_NAME: ${{ steps.config.outputs.project_name }}
        run: |
          cdk destroy "${PROJECT_NAME}-Dataplane" --exclusively --app cdk.out --force &
          PID_DP=$!

          PID_IT=""
          if aws cloudformation describe-stacks --stack-name "${PROJECT_NAME}-IntegrationTest" > /dev/null 2>&1; then
            cdk destroy "${PROJECT_NAME}-IntegrationTest" --exclusively --app cdk.out --force &
            PID_IT=$!
          else
            echo "No integration test stack found, skipping"
          fi

          FAILED=0
          wait ${PID_DP} || FAILED=1
          if [ -n "${PID_IT}" ]; then
            wait ${PID_IT} || FAILED=1
          fi

          if [ ${FAILED} -ne 0 ]; then
            echo "::error::One or more stack destroys failed"
            exit 1
          fi
      - name: Destroy network stack
        working-directory: cdk
        env:
          PROJECT_NAME: ${{ steps.config.outputs.project_name }}
        run: cdk destroy "${PROJECT_NAME}-Network" --exclusively --app cdk.out --force

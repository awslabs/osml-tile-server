name: 'Generate Deployment JSON'
description: 'Generate deployment.json from example template'
inputs:
  account_id:
    description: 'AWS account ID'
    required: true
  build_from_source:
    description: 'Whether to build from source'
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Generate deployment.json
      working-directory: cdk
      shell: bash
      env:
        ACCOUNT_ID: ${{ inputs.account_id }}
        BUILD_FROM_SOURCE: ${{ inputs.build_from_source }}
      run: |
        python3 << 'EOF'
        import json
        import os
        with open('bin/deployment/deployment.json.example') as f:
            config = json.load(f)
        config['projectName'] = os.environ.get('PROJECT_NAME', 'OSML')
        config['account']['id'] = os.environ['ACCOUNT_ID']
        config['account']['region'] = os.environ.get('AWS_REGION', os.environ.get('REGION', '<YOUR-REGION>'))
        config['account']['prodLike'] = False
        build_from_source = os.environ.get('BUILD_FROM_SOURCE', 'true').lower() == 'true'
        if 'networkConfig' in config:
            del config['networkConfig']
        if 'dataplaneConfig' in config:
            config['dataplaneConfig']['BUILD_FROM_SOURCE'] = build_from_source
        # Ensure deployIntegrationTests is set to true for CI/CD
        config['deployIntegrationTests'] = True
        # Add testConfig if it doesn't exist, or update BUILD_FROM_SOURCE if it does
        if 'testConfig' not in config:
            config['testConfig'] = {}
        config['testConfig']['BUILD_FROM_SOURCE'] = build_from_source
        with open('bin/deployment/deployment.json', 'w') as f:
            json.dump(config, f, indent=2)
        EOF
